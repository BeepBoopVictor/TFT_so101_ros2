controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true
    # Tiempo de espera para evitar errores de timeout en Jazzy
    switch_controller_timeout: 10.0

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/GripperActionController

arm_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - shoulder_pan
      - shoulder_lift
      - elbow_flex
      - wrist_flex
      - wrist_roll
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

gripper_controller:
  ros__parameters:
    use_sim_time: true
    joint: gripper
    command_interface: position
    state_interface: position
